[build]
  command = "pip install -r requirements-build.txt && python scripts/fetch_data.py && npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"
  PYTHON_VERSION = "3.11"

# SPA fallback — serve index.html for all routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
