name: Refresh Data from BigQuery

on:
  schedule:
    # Run daily at 6:00 AM UTC (1:00 AM EST)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements-build.txt

      - name: Fetch data from BigQuery
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: python scripts/fetch_data.py

      - name: Validate fetched data
        run: |
          JOBS_COUNT=$(python3 -c "import json; print(len(json.load(open('public/data/jobs.json'))))")
          echo "Jobs count: $JOBS_COUNT"
          if [ "$JOBS_COUNT" -lt 10 ]; then
            echo "ERROR: jobs.json has only $JOBS_COUNT rows — likely a credential or query failure. Aborting to protect existing data."
            exit 1
          fi

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "No data changes detected, skipping commit"
          else
            git commit -m "Refresh data from BigQuery ($(date -u +%Y-%m-%d))"
            git push
          fi
